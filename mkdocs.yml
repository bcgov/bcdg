site_name: "BC Developer Guide"
site_description: "A guide to application development for the B.C. government."
repo_url: https://github.com/bcgov/bcdg
docs_dir: "docs"
edit_uri: edit/main/docs/
plugins:
  - techdocs-core
  - git-revision-date-localized
  - redirects:
      redirect_maps:
        'rocketchat/get-help-in-rocketchat.md': 'developer-community/developer-community-ms-teams-guide.md'
        'rocketchat/rocketchat-channel-descriptions.md': 'developer-community/developer-community-ms-teams-guide.md'
        'rocketchat/rocketchat-etiquette.md': 'developer-community/developer-community-ms-teams-guide.md'
        'rocketchat/steps-to-join-rocketchat.md': 'developer-community/developer-community-ms-teams-guide.md'
markdown_extensions:
    - md_in_html

validation:
    omitted_files: warn
    absolute_links: warn  # Or 'relative_to_docs' - new in MkDocs 1.6
    unrecognized_links: warn

exclude_docs: |
    digital_government.md
    ways_of_working.md
    supports_for_developers.md

nav:
  - Welcome to the B.C. Government: index.md
  # - Digital Government: digital_government.md
  # - Ways of Working: ways_of_working.md
  # - Supports for developers: supports_for_developers.md
  - Choosing project technology: choosing-technology/how-to-select-technology.md
  - Security and Privacy: 
      - Security and Privacy guidance: security/security-and-privacy-compliance-and-guidance.md 
      - Security best practices for apps: security/best-practices-for-apps.md
  - Accessibility: 
    - Accessibility: accessibility-resources.md
    - The design system: design-system/about-the-design-system.md
  - GitHub in the B.C. government:
      - B.C. Government GitHub Quick Reference: use-github-in-bcgov/quick-reference.md
      - bcgov, bcgov-c, and SSO: use-github-in-bcgov/bc-government-organizations-in-github.md
      - SSO IDIR and technical guide: use-github-in-bcgov/github-transition-guide.md
      - First steps working in GitHub: use-github-in-bcgov/start-working-in-bcgov-github-organization.md
      - Evaluate open-source content: use-github-in-bcgov/evaluate-open-source-content.md
      - Licenses for GitHub repos: use-github-in-bcgov/license-your-github-repository.md
      - Required pages for a GitHub repository: use-github-in-bcgov/required-pages-for-github-repository.md
      - Transferring repos to bcgov or bcgov-c: use-github-in-bcgov/transferring-repos-to-bc-gov-orgs.md
      - Removing member access: use-github-in-bcgov/remove-user-bcgov-github-access.md     
      
  - Developer Community in Microsoft Teams:
    - Developer Community Microsoft Teams guide: developer-community/developer-community-ms-teams-guide.md
    - Acceptance criteria for public channels: developer-community/acceptance-criteria.md
    - Participation guidelines: developer-community/participation-guidelines.md
    - Microsoft access for contractors: developer-community/ms-teams-contractors-access.md
  - Relay app and webhook integration: 
    - Onboarding guide:Microsoft Teams Webhook Integration: webhooks/msteams-webhooks.md
    - Install Relay and create your first workflow: webhooks/create-workflow.md
    - Troubleshooting guide: webhooks/troubleshooting.md
    - Webhook & workflow governance: webhooks/governance.md

  - Quickstart Wizards:
    - Quickstart for OpenShift Wizard: wizards/quickstart-for-openshift-wizard.md
  - DevHub Content Partner Guide: content-partner-guide.md
  - DevHub Content Syntax Guide: content-syntax-guide.md
  - Working with data: working-with-data.md
  - BC Government API Guidelines: bc-government-api-guidelines.md

